    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js').then(function(registration) {

    <script>
        const video = document.getElementById('camera');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const ctx = overlayCanvas.getContext('2d', { willReadFrequently: true });
        
        const zxingCanvas = document.getElementById('zxingCanvas');
        const zxingCtx = zxingCanvas.getContext('2d', { willReadFrequently: true });

        const statusText = document.getElementById('statusText');

        let isScanning = false;
        // scanStage: 0=Idle, 1=Scan QR1, 2=Password/SysEnc wait, 3=Scan QR2
        let scanStage = 0;
        let firstQR = null;
        let secondQR = null;
        let appMask = null;
        let lastDetectTime = 0;
        let isProcessing = false;
        let sysEncStage3 = false; // 通常モードでシステム暗号化の第2QR探索中フラグ
        let digitalSignStage3 = false; // 電子署名モードの第2QR（もしくはペア）探索中フラグ
        let lastTwinBBox = null; // ★ Stage 1で検出したツインQRの領域を保存

        const SCAN_INTERVAL_MS = 50;

        // モード: 'normal' or 'double'
        let scanMode = 'normal';

        let barcodeDetector = null;
        if ('BarcodeDetector' in window) {
            try {
                barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
            } catch (e) { console.warn("BarcodeDetector error", e); }
        }

        // --- SHA-256 Implementation (Same as Generator) ---
        function sha256Bytes(msgBytes) {
          const K = new Uint32Array([
            0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
            0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
            0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
            0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
            0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
            0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
            0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
            0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
          ]);
          function rotr(x,n){ return (x>>>n) | (x<<(32-n)); }
          function ch(x,y,z){ return (x & y) ^ (~x & z); }
          function maj(x,y,z){ return (x & y) ^ (x & z) ^ (y & z); }
          function s0(x){ return rotr(x,7) ^ rotr(x,18) ^ (x>>>3); }
          function s1(x){ return rotr(x,17) ^ rotr(x,19) ^ (x>>>10); }
          function S0(x){ return rotr(x,2) ^ rotr(x,13) ^ rotr(x,22); }
          function S1(x){ return rotr(x,6) ^ rotr(x,11) ^ rotr(x,25); }

          const ml = msgBytes.length;
          const bitLenHi = Math.floor((ml * 8) / 0x100000000);
          const bitLenLo = (ml * 8) >>> 0;
          const withOne = ml + 1;
          let padLen = (withOne % 64 <= 56) ? (56 - (withOne % 64)) : (56 + 64 - (withOne % 64));
          const totalLen = withOne + padLen + 8;
          const m = new Uint8Array(totalLen);
          m.set(msgBytes, 0); m[ml] = 0x80;
          const dv = new DataView(m.buffer);
          dv.setUint32(totalLen - 8, bitLenHi, false);
          dv.setUint32(totalLen - 4, bitLenLo, false);

          let a=0x6a09e667,b=0xbb67ae85,c=0x3c6ef372,d=0xa54ff53a,e=0x510e527f,f=0x9b05688c,g=0x1f83d9ab,h=0x5be0cd19;
          const W = new Uint32Array(64);
          for (let off = 0; off < totalLen; off += 64) {
            for (let i = 0; i < 16; i++) W[i] = dv.getUint32(off + i * 4, false);
            for (let i = 16; i < 64; i++) W[i] = (s1(W[i-2]) + W[i-7] + s0(W[i-15]) + W[i-16]) >>> 0;
            let A=a,B=b,C=c,D=d,E=e,F=f,G=g,H=h;
            for (let i = 0; i < 64; i++) {
              const t1 = (H + S1(E) + ch(E, F, G) + K[i] + W[i]) >>> 0;
              const t2 = (S0(A) + maj(A, B, C)) >>> 0;
              H=G; G=F; F=E; E=(D + t1) >>> 0; D=C; C=B; B=A; A=(t1 + t2) >>> 0;
            }
            a=(a+A)>>>0; b=(b+B)>>>0; c=(c+C)>>>0; d=(d+D)>>>0; e=(e+E)>>>0; f=(f+F)>>>0; g=(g+G)>>>0; h=(h+H)>>>0;
          }
          const out = new Uint8Array(32);
          const odv = new DataView(out.buffer);
          odv.setUint32(0, a, false); odv.setUint32(4, b, false); odv.setUint32(8, c, false); odv.setUint32(12, d, false);
          odv.setUint32(16, e, false); odv.setUint32(20, f, false); odv.setUint32(24, g, false); odv.setUint32(28, h, false);
          return out;
        }

        function bytesToBigInt(bytes) {
          let hex = "";
          for (let i = 0; i < bytes.length; i++) hex += bytes[i].toString(16).padStart(2, "0");
          return BigInt("0x" + (hex || "0"));
        }

        function bytesToHex(bytes) {
          return Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
        }

        async function sha256BytesAsync(msgBytes) {
            // 環境によって crypto.subtle が無い場合があるため、常に自前実装を使用
            return sha256Bytes(msgBytes);
        }

        async function deriveEncryptionMaskBytesAsync(password, neededBytes) {
            if (!password) return null;
            const pwBytes = new TextEncoder().encode(password);
            let h0 = await sha256BytesAsync(pwBytes);
            let result = new Uint8Array(neededBytes);
            let offset = 0;
            let currentHash = h0;
            
            while (offset < neededBytes) {
                const copyLen = Math.min(currentHash.length, neededBytes - offset);
                result.set(currentHash.subarray(0, copyLen), offset);
                offset += copyLen;
                if (offset < neededBytes) {
                    currentHash = await sha256BytesAsync(currentHash);
                }
            }
            return result;
        }

        // ===== ECDSA secp160r1 検証用実装 =====
        const SECP160R1 = {
            p: 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF7FFFFFFFn,
            a: 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF7FFFFFFFn - 3n,
            b: 0x1C97BEFC54BD7A8B65ACF89F81D4D4ADC565FA45n,
            Gx: 0x4A96B5688EF573284664698968C38BB913CBFC82n,
            Gy: 0x23A628553168947D59DCC912042351377AC5FB32n,
            n: 0x0100000000000000000001F4C8F927AED3CA752257n
        };
        
        function bigMod(a, m) { return ((a % m) + m) % m; }
        
        function modInverse(a, m) {
            a = bigMod(a, m);
            let [old_r, r] = [a, m];
            let [old_s, s] = [1n, 0n];
            while (r !== 0n) {
                const quotient = old_r / r;
                [old_r, r] = [r, old_r - quotient * r];
                [old_s, s] = [s, old_s - quotient * s];
            }
            return bigMod(old_s, m);
        }
        
        function pointAdd(P, Q) {
            if (!P) return Q;
            if (!Q) return P;
            const { p, a } = SECP160R1;
            if (P.x === Q.x && P.y !== Q.y) return null;
            let m;
            if (P.x === Q.x && P.y === Q.y) {
                if (P.y === 0n) return null;
                m = bigMod((3n * P.x * P.x + a) * modInverse(2n * P.y, p), p);
            } else {
                m = bigMod((Q.y - P.y) * modInverse(Q.x - P.x, p), p);
            }
            const x = bigMod(m * m - P.x - Q.x, p);
            const y = bigMod(m * (P.x - x) - P.y, p);
            return { x, y };
        }
        
        function pointMultiply(k, P) {
            let R = null;
            let Q = { x: P.x, y: P.y };
            let tempK = k;
            while (tempK > 0n) {
                if (tempK & 1n) R = pointAdd(R, Q);
                Q = pointAdd(Q, Q);
                tempK >>= 1n;
            }
            return R;
        }

        function ecdsaVerify(hashBytes, sigR, sigS, pubKeyHex) {
            const { p, n, Gx, Gy } = SECP160R1;
            const hashValue = sha256Bytes(hashBytes);
            const e = bytesToBigInt(hashValue);
            const z = e >> BigInt(Math.max(0, hashValue.length * 8 - 160));
            
            const r = bytesToBigInt(sigR);
            const s = bytesToBigInt(sigS);
            
            if (r <= 0n || r >= n || s <= 0n || s >= n) return false;
            
            const w = modInverse(s, n);
            const u1 = bigMod(z * w, n);
            const u2 = bigMod(r * w, n);
            
            const G = { x: Gx, y: Gy };
            const Qx = BigInt("0x" + pubKeyHex.substring(2, 42));
            const Qy = BigInt("0x" + pubKeyHex.substring(42, 82));
            const Q = { x: Qx, y: Qy };
            
            const u1G = pointMultiply(u1, G);
            const u2Q = pointMultiply(u2, Q);
            const R = pointAdd(u1G, u2Q);
            
            if (!R) return false;
            return bigMod(R.x, n) === r;
        }

        const ECDSA_PUBLIC_KEYS = {
            1: "046a4e7d6aca3f3903eb33c7d890eb06ab40943e314ac73a562414b347c1a286b791b057feeccb3038",
            2: "043a9d0e35df4c6602971073a703c45ae87ba8074e1d49f24fc36f0fc27aa9f6009b6afe39f0b5cc9b",
            3: "0491516f25a3044bc2d6fbbb28437b5645f3fdfd24916e2b658a1b7a54acaf7c1fccd7f9cb364a4a51",
            4: "0406a98cb2e453c5e60993ef83c70b7526340765108302dc2d8e97c8e10140021b19c81edd6e6f782c",
            5: "0470bf87f7189b4d06ea5fd556431622a081cc7338921d086fbb77d7313492dd5795957f85424456e2",
            6: "0422d3020fd4bdb0935fab8a28a2b9c90a36c05768a7e7d60d17f0783ac2d92992cc311141cc9d07bd",
            7: "044f15effd43786d7d3751afd7799084a67dcd0e1adb0c19c8e5eef2fd1b85bf911a4edb2f385ffaa9",
            8: "0462c63a8e85ede6fc8a927bbe94ec16fdfa46e22dc1d3b5ccf74d507b38be8c71a84f038f8e0a66b4",
            9: "046563d6db3eae744da941ff7084b376fb2852f00197de9d1dee81e66c2ad659187cd1a36ef5719901",
            10: "04fe13aaeb907d22d0f2dbb9d873fca32835f651974ea86d7f36117c8c0506324f9b0c975e41528096"
        };

        const ECDSA_SENDER_NAMES = {
            1: "山田 一郎", 2: "鈴木 二郎", 3: "佐藤 三郎", 4: "高橋 四子", 5: "田中 五郎",
            6: "伊藤 六子", 7: "渡辺 七郎", 8: "小林 八子", 9: "加藤 九郎", 10: "中村 十郎"
        };

        // --- 描画関数 ---
        const drawLine = (begin, end, color) => {
            ctx.beginPath();
            ctx.moveTo(begin.x, begin.y);
            ctx.lineTo(end.x, end.y);
            ctx.lineWidth = 4;
            ctx.strokeStyle = color;
            ctx.stroke();
        };

        const drawBoundingBox = (points, color) => {
            if (!points || points.length !== 4) return;
            drawLine(points[0], points[1], color);
            drawLine(points[1], points[2], color);
            drawLine(points[2], points[3], color);
            drawLine(points[3], points[0], color);
        };

        // --- カメラ制御 ---
        async function startCamera() {
            try {
                statusText.innerText = "カメラをリクエスト中...";
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                
                await new Promise((resolve) => {
                    video.onloadeddata = () => resolve();
                    setTimeout(resolve, 2000);
                });
                
                try {
                    await video.play();
                } catch(e) {
                    statusText.innerText = "画面をタップして再生を許可してください";
                    return;
                }

                document.getElementById('btnContainer').style.display = 'none';
                document.getElementById('cameraControls').style.display = 'flex';
                scanStage = 1;
                isScanning = true;

                if (scanMode === 'normal') {
                    statusText.innerText = "第1QRを探索中... (Hybrid)";
                } else {
                    statusText.innerText = "第1QR（システム暗号化）を探索中...";
                }
                requestAnimationFrame(scanLoop);
                
            } catch (err) {
                statusText.innerText = "エラー: " + err.message;
            }
        }

        // モード選択ボタン
        document.getElementById('normalModeBtn').addEventListener('click', () => {
            scanMode = 'normal';
            document.getElementById('headerText').innerText = 'QR Twin Reader (通常モード)';
            startCamera();
        });

        document.getElementById('doubleEncModeBtn').addEventListener('click', () => {
            scanMode = 'double';
            document.getElementById('headerText').innerText = 'QR Twin Reader (二重暗号化モード)';
            startCamera();
        });

        document.getElementById('digitalSignModeBtn').addEventListener('click', () => {
            scanMode = 'digital_sign';
            document.getElementById('headerText').innerText = 'QR Twin Reader (電子署名対応)';
            startScanByDigitalSign();
        });

        function startScanByDigitalSign() {
            scanStage = 1;
            digitalSignStage3 = false;
            statusText.innerText = "電子署名モード: 第1QRを探索中...";
            startCamera();
        }

        // --- UI アクション ---
        function showPasswordScreen() {
            if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
            
            isScanning = false;
            scanStage = 2;
            document.getElementById('qr1PreviewText').innerText = firstQR.text;
            document.getElementById('appPasswordInput').value = "";
            document.getElementById('passwordScreen').style.display = 'flex';
        }

        function showSysEncScreen() {
            if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
            
            isScanning = false;
            scanStage = 2;
            document.getElementById('sysEncQr1Text').innerText = firstQR.text;
            document.getElementById('sysEncScreen').style.display = 'flex';
        }

        function showDoubleEncScreen() {
            if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
            
            isScanning = false;
            scanStage = 2;
            document.getElementById('doubleEncQr1Text').innerText = firstQR.text;
            document.getElementById('doubleEncPasswordInput').value = "";
            document.getElementById('doubleEncScreen').style.display = 'flex';
        }

        function cancelPassword() {
            document.getElementById('passwordScreen').style.display = 'none';
            goBack();
        }

        function cancelSysEnc() {
            document.getElementById('sysEncScreen').style.display = 'none';
            goBack();
        }

        function cancelDoubleEnc() {
            document.getElementById('doubleEncScreen').style.display = 'none';
            goBack();
        }

        async function submitPassword() {
            const pw = document.getElementById('appPasswordInput').value;
            if (!pw) {
                alert("パスワードを入力してください");
                return;
            }
            
            document.getElementById('passwordScreen').style.display = 'none';
            statusText.innerText = "マスク生成中...";
            
            appMask = await deriveEncryptionMaskBytesAsync(pw, 5000);
            
            scanStage = 3;
            if (firstQR) firstQR.points = null;
            
            statusText.innerText = "第2QRを探索中... (jsQR XOR)";
            isScanning = true;
            lastDetectTime = Date.now();
            requestAnimationFrame(scanLoop);
        }

        function resumeAfterSysEnc() {
            document.getElementById('sysEncScreen').style.display = 'none';
            
            scanStage = 3;
            sysEncStage3 = true; // システム暗号化復号モードをON
            if (firstQR) firstQR.points = null;
            
            statusText.innerText = "第2QR（システム暗号化）を探索中...";
            isScanning = true;
            lastDetectTime = Date.now();
            requestAnimationFrame(scanLoop);
        }

        async function resumeAfterDoubleEnc() {
            const pw = document.getElementById('doubleEncPasswordInput').value;
            if (!pw) {
                alert("パスワードを入力してください");
                return;
            }

            document.getElementById('doubleEncScreen').style.display = 'none';
            statusText.innerText = "マスク生成中...";
            
            // 入力されたパスワードを使用して第2QRのマスク生成
            appMask = await deriveEncryptionMaskBytesAsync(pw, 5000);
            
            scanStage = 3;
            if (firstQR) firstQR.points = null;
            
            statusText.innerText = "第2QR（アプリ暗号化）を探索中...";
            isScanning = true;
            lastDetectTime = Date.now();
            requestAnimationFrame(scanLoop);
        }

        function showResultScreen(digitalSignResult = null) {
            if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
            
            isScanning = false;
            
            const resText1El = document.getElementById('resText1');
            const resText2El = document.getElementById('resText2');
            const resultBox = document.querySelector('#resultScreen .overlay-box');
            
            // 既存の動的生成要素（電子署名コメントなど）を削除
            const existingComment = document.getElementById('digitalSignComment');
            if (existingComment) existingComment.remove();
            
            resText1El.innerText = firstQR ? firstQR.text : "-";
            
            if (digitalSignResult) {
                resText2El.innerText = digitalSignResult.verified ? 
                   `電子署名(${digitalSignResult.senderName})` : "電子署名(検証エラー)";
                   
                const commentDiv = document.createElement('div');
                commentDiv.id = 'digitalSignComment';
                commentDiv.style.marginTop = "10px";
                commentDiv.style.fontWeight = "bold";
                if (digitalSignResult.verified) {
                    commentDiv.style.color = "#4CAF50";
                    commentDiv.innerText = `電子署名の認証ができました。\n作成者は「${digitalSignResult.senderName}」です。`;
                } else {
                    commentDiv.style.color = "#F44336";
                    commentDiv.innerText = "電子署名の認証ができませんでした。";
                }
                resultBox.appendChild(commentDiv);
            } else {
                resText2El.innerText = secondQR ? secondQR.text : "-";
            }
            
            document.getElementById('resultScreen').style.display = 'flex';
        }

        function goBack() {
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('passwordScreen').style.display = 'none';
            document.getElementById('sysEncScreen').style.display = 'none';
            document.getElementById('doubleEncScreen').style.display = 'none';
            firstQR = null;
            secondQR = null;
            appMask = null;
            sysEncStage3 = false;
            digitalSignStage3 = false;
            lastTwinBBox = null;
            
            // モード選択画面に戻す
            scanStage = 0;
            isScanning = false;
            document.getElementById('cameraControls').style.display = 'none';
            document.getElementById('btnContainer').style.display = '';
            statusText.innerText = "モードを選択してください";
            document.getElementById('headerText').innerText = 'QR Twin Reader (全暗号化対応)';
        }

        function restartScan() {
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('passwordScreen').style.display = 'none';
            document.getElementById('sysEncScreen').style.display = 'none';
            document.getElementById('doubleEncScreen').style.display = 'none';
            firstQR = null;
            secondQR = null;
            appMask = null;
            sysEncStage3 = false;
            digitalSignStage3 = false;
            lastTwinBBox = null;

            isScanning = true;
            
            if (scanMode === 'digital_sign') {
                digitalSignStage3 = true;
                scanStage = 3;
                statusText.innerText = "電子署名モード: 第1/第2QRを探索中...";
            } else if (scanMode === 'normal') {
                scanStage = 1;
                statusText.innerText = "第1QRを探索中... (Hybrid)";
            } else {
                scanStage = 1;
                statusText.innerText = "第1QR（システム暗号化）を探索中...";
            }
            
            requestAnimationFrame(scanLoop);
        }

        // --- メインスキャンループ ---
        async function scanLoop() {
            if (!isScanning) return;

            if (video.videoWidth && overlayCanvas.width !== video.videoWidth) {
                overlayCanvas.width = video.videoWidth;
                overlayCanvas.height = video.videoHeight;
            }

            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            if (firstQR && firstQR.points) drawBoundingBox(firstQR.points, '#00E676');
            if (secondQR && secondQR.points) drawBoundingBox(secondQR.points, '#29B6F6');

            const now = Date.now();
            if (!isProcessing && now - lastDetectTime > SCAN_INTERVAL_MS && video.readyState >= 2) {
                isProcessing = true;
                lastDetectTime = now;

                try {
                    let detectedItems = [];

                    // === 通常モード: Stage 1 ===
                    // 二重暗号化モードの Stage 1 ではシステム暗号化された第1QRを探す
                    // → jsQR の sysEncDecode を使う
                    const needSysEncForStage1 = (scanMode === 'double' && scanStage === 1);
                    // 通常モードの Stage 3 でシステム暗号化された第2QRを探す場合
                    const needSysEncForStage3 = (scanMode === 'normal' && scanStage === 3 && sysEncStage3);

                    let useNativeDetector = barcodeDetector && (scanStage === 1 || (scanStage === 3 && !appMask && !needSysEncForStage3));
                    // システム暗号化復号が必要な場合はネイティブではなくjsQRを使う
                    if (needSysEncForStage1) {
                        useNativeDetector = false;
                    }

                    let cropBBox = null;

                    // --- [フェーズ 1 / ネイティブ優先] Hybrid (BarcodeDetector Crop + jsQR) ---
                    if (useNativeDetector) {
                        try {
                            const barcodes = await barcodeDetector.detect(video);
                            if (barcodes && barcodes.length > 0) {
                                for (let i = 0; i < barcodes.length; i++) {
                                    const b = barcodes[i];

                                    const bbox = b.boundingBox;
                                    const PADDING = 50; 
                                    const sx = Math.max(0, Math.floor(bbox.x) - PADDING);
                                    const sy = Math.max(0, Math.floor(bbox.y) - PADDING);
                                    const sw = Math.min(video.videoWidth - sx, Math.ceil(bbox.width) + PADDING * 2);
                                    const sh = Math.min(video.videoHeight - sy, Math.ceil(bbox.height) + PADDING * 2);

                                    zxingCanvas.width = sw;
                                    zxingCanvas.height = sh;
                                    zxingCtx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);
                                    const imgData = zxingCtx.getImageData(0, 0, sw, sh);

                                    const resList = jsQR(imgData.data, sw, sh, { inversionAttempts: "attemptBoth", multi: true });
                                    if (resList && resList.length > 0) {
                                        for (const res of resList) {
                                            if (res && res.data && !res.isRaw) {
                                                detectedItems.push({
                                                    data: res.data,
                                                    managementCode: res.managementCode,
                                                    codewords: res.codewords,
                                                    points: [
                                                        { x: res.location.topLeftCorner.x + sx, y: res.location.topLeftCorner.y + sy },
                                                        { x: res.location.topRightCorner.x + sx, y: res.location.topRightCorner.y + sy },
                                                        { x: res.location.bottomRightCorner.x + sx, y: res.location.bottomRightCorner.y + sy },
                                                        { x: res.location.bottomLeftCorner.x + sx, y: res.location.bottomLeftCorner.y + sy }
                                                    ]
                                                });
                                            }
                                        }
                                    }
                                }
                            }
                        } catch(err) { /* ignore Native Error */ }
                    }

                    // --- [フェーズ 2] BarcodeDetector位置検出 + jsQRクロップ復号 (appMask専用ハイブリッド) ---
                    // appMask設定時: BarcodeDetectorでQRの位置だけ検出→クロップ→jsQRで暗号復号
                    // BarcodeDetector自身は暗号化QRを復号できないが、位置検出は高速に行える
                    if (detectedItems.length === 0 && barcodeDetector && scanStage === 3 && appMask) {
                        try {
                            const barcodes = await barcodeDetector.detect(video);
                            if (barcodes && barcodes.length > 0) {
                                for (let i = 0; i < barcodes.length; i++) {
                                    const b = barcodes[i];
                                    const bbox = b.boundingBox;
                                    const PADDING = 50;
                                    const sx = Math.max(0, Math.floor(bbox.x) - PADDING);
                                    const sy = Math.max(0, Math.floor(bbox.y) - PADDING);
                                    const sw = Math.min(video.videoWidth - sx, Math.ceil(bbox.width) + PADDING * 2);
                                    const sh = Math.min(video.videoHeight - sy, Math.ceil(bbox.height) + PADDING * 2);

                                    zxingCanvas.width = sw;
                                    zxingCanvas.height = sh;
                                    zxingCtx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);
                                    const imgData = zxingCtx.getImageData(0, 0, sw, sh);

                                    const cropResList = jsQR(imgData.data, sw, sh, {
                                        inversionAttempts: "attemptBoth",
                                        appEncMask: Array.from(appMask),
                                        multi: true
                                    });

                                    if (cropResList && cropResList.length > 0) {
                                        for (const cropRes of cropResList) {
                                            if (cropRes && cropRes.data && !cropRes.isRaw) {
                                                detectedItems.push({
                                                    data: cropRes.data,
                                                    managementCode: cropRes.managementCode,
                                                    codewords: cropRes.codewords,
                                                    points: [
                                                        { x: cropRes.location.topLeftCorner.x + sx, y: cropRes.location.topLeftCorner.y + sy },
                                                        { x: cropRes.location.topRightCorner.x + sx, y: cropRes.location.topRightCorner.y + sy },
                                                        { x: cropRes.location.bottomRightCorner.x + sx, y: cropRes.location.bottomRightCorner.y + sy },
                                                        { x: cropRes.location.bottomLeftCorner.x + sx, y: cropRes.location.bottomLeftCorner.y + sy }
                                                    ]
                                                });
                                            }
                                        }
                                    }
                                }
                            }
                        } catch(err) { /* ignore */ }
                    }

                    // --- [フェーズ 2.5] Stage 1位置再利用 + jsQRクロップ復号 (二重暗号化などBarcodeDetector失敗時用) ---
                    // Stage 1で既にツインの座標を取得しているため、その周辺だけを探すことでフルスクリーンを回避する
                    if (detectedItems.length === 0 && scanStage === 3 && (appMask || digitalSignStage3) && lastTwinBBox) {
                        const bbox = lastTwinBBox;
                        const PADDING = 80; // 多少のカメラ揺れを吸収するため広めに
                        const sx = Math.max(0, Math.floor(bbox.x) - PADDING);
                        const sy = Math.max(0, Math.floor(bbox.y) - PADDING);
                        const sw = Math.min(video.videoWidth - sx, Math.ceil(bbox.width) + PADDING * 2);
                        const sh = Math.min(video.videoHeight - sy, Math.ceil(bbox.height) + PADDING * 2);

                        if (sw > 0 && sh > 0) {
                            zxingCanvas.width = sw;
                            zxingCanvas.height = sh;
                            zxingCtx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);
                            const imgData = zxingCtx.getImageData(0, 0, sw, sh);

                            const cropResList = jsQR(imgData.data, sw, sh, {
                                inversionAttempts: "attemptBoth",
                                appEncMask: Array.from(appMask),
                                multi: true
                            });

                            if (cropResList && cropResList.length > 0) {
                                for (const cropRes of cropResList) {
                                    if (cropRes && cropRes.data && !cropRes.isRaw) {
                                        detectedItems.push({
                                            data: cropRes.data,
                                            managementCode: cropRes.managementCode,
                                            codewords: cropRes.codewords,
                                            points: [
                                                { x: cropRes.location.topLeftCorner.x + sx, y: cropRes.location.topLeftCorner.y + sy },
                                                { x: cropRes.location.topRightCorner.x + sx, y: cropRes.location.topRightCorner.y + sy },
                                                { x: cropRes.location.bottomRightCorner.x + sx, y: cropRes.location.bottomRightCorner.y + sy },
                                                { x: cropRes.location.bottomLeftCorner.x + sx, y: cropRes.location.bottomLeftCorner.y + sy }
                                            ]
                                        });
                                    }
                                }
                            }
                        }
                    }

                    // --- [フェーズ 3 / Fallback] Custom jsQR Full-Screen Scan ---
                    if (detectedItems.length === 0) {
                        zxingCanvas.width = overlayCanvas.width;
                        zxingCanvas.height = overlayCanvas.height;
                        zxingCtx.drawImage(video, 0, 0, zxingCanvas.width, zxingCanvas.height);
                        const fullData = zxingCtx.getImageData(0, 0, zxingCanvas.width, zxingCanvas.height);

                        const opts = { inversionAttempts: "attemptBoth" };

                        if (scanStage === 3) {
                            if (appMask) {
                                opts.appEncMask = Array.from(appMask);
                            } else if (needSysEncForStage3) {
                                // 通常モード: 第2QRはシステム暗号化されている
                                opts.sysEncDecode = true;
                            } else {
                                opts.multi = true;
                            }
                        }

                        // 二重暗号化モードの Stage 1: システム暗号化された第1QRを探す
                        if (needSysEncForStage1) {
                            opts.sysEncDecode = true;
                        }

                        let resFullList = jsQR(fullData.data, fullData.width, fullData.height, opts);
                        if (resFullList && !Array.isArray(resFullList)) resFullList = [resFullList];

                        if (resFullList && resFullList.length > 0) {
                            for (let resFull of resFullList) {
                                if (resFull && resFull.data) {
                                    if (scanStage === 1 && resFull.isRaw) continue;
                                    
                                    detectedItems.push({
                                        data: resFull.data,
                                        managementCode: resFull.managementCode,
                                        codewords: resFull.codewords,
                                        points: [
                                            resFull.location.topLeftCorner,
                                            resFull.location.topRightCorner,
                                            resFull.location.bottomRightCorner,
                                            resFull.location.bottomLeftCorner
                                        ]
                                    });
                                }
                            }
                        }
                    }

                    // --- 結果処理ループ ---
                    for (let item of detectedItems) {
                        const { data: resultData, managementCode: resultMgmt, points: resultPts } = item;
                        const mgmtStr = resultMgmt !== undefined ? resultMgmt.toString(2).padStart(16, '0') : "0000000000000000";
                        const topBit = ((resultMgmt || 0) >> 15) & 1; // 0なら第1QR、1なら第2QR

                        if (scanStage === 1) {
                            // Stage 1でQRを発見した際、領域を保存
                            if (resultPts && resultPts.length === 4) {
                                const xs = resultPts.map(p => p.x);
                                const ys = resultPts.map(p => p.y);
                                lastTwinBBox = {
                                    x: Math.min(...xs), y: Math.min(...ys),
                                    width: Math.max(...xs) - Math.min(...xs), height: Math.max(...ys) - Math.min(...ys)
                                };
                            }

                            // 1) 通常モードでは何もしない（誤判定防止）
                            //   ただし、電子署名ビットが立っている場合は、通常データとして扱う
                            //   以前のように自動遷移は行わない
                            
                            // 2) デジタル署名モードの初期処理はここではなく、Stage3で扱うが、
                            //    もしStage1で何らかの理由でここに来た場合は、Stage3へ導く
                            if (scanMode === 'digital_sign') {
                                scanStage = 3;
                                digitalSignStage3 = true;
                                if (topBit === 0) {
                                    firstQR = { 
                                        text: resultData, 
                                        managementCode: resultMgmt, 
                                        points: resultPts, 
                                        codewords: item.codewords
                                    };
                                    statusText.innerText = "第2QR（電子署名データ）を探索中...";
                                } else {
                                    secondQR = { text: resultData, managementCode: resultMgmt, points: resultPts };
                                    statusText.innerText = "第1QR（元のデータ）を探索中...";
                                }
                                continue;
                            }

                            // 2) デジタル署名ではない通常のStage 1処理（第1QRのみ受け入れ）
                            if (topBit !== 0) continue; 
                            
                            firstQR = { 
                                text: resultData, 
                                managementCode: resultMgmt, 
                                points: resultPts, 
                                codewords: item.codewords
                            };
                            
                            // 同一データフラグ
                            if (mgmtStr[5] === '1') {
                                secondQR = { text: resultData, managementCode: resultMgmt, points: resultPts };
                                isScanning = false;
                                isProcessing = false;
                                showResultScreen();
                                return;
                            }

                            if (scanMode === 'normal') {
                                if (mgmtStr[6] === '1') {
                                    isProcessing = false;
                                    showSysEncScreen();
                                    return;
                                } else if (mgmtStr[7] === '1') {
                                    isProcessing = false;
                                    showPasswordScreen();
                                    return;
                                } else {
                                    scanStage = 3;
                                    statusText.innerText = "第2QRを探索中...";
                                }
                            } else {
                                // 二重暗号化モード
                                isProcessing = false;
                                showDoubleEncScreen();
                                return;
                            }
                        }
                        else if (scanStage === 3) {
                            // ★ 電子署名モードのペア探索中
                            if (digitalSignStage3) {
                                // もし missing QR が見つかったら
                                if (topBit === 1 && !secondQR) {
                                    secondQR = { text: resultData, managementCode: resultMgmt, points: resultPts };
                                } else if (topBit === 0 && !firstQR) {
                                    firstQR = { 
                                        text: resultData, 
                                        managementCode: resultMgmt, 
                                        points: resultPts, 
                                        codewords: item.codewords
                                    };
                                } else {
                                    continue; // それ以外の重複読取は無視
                                }

                                // 必要な両方のQRが揃った → 電子署名の検証を実行
                                if (firstQR && secondQR) {
                                    isScanning = false;
                                    isProcessing = false;
                                    statusText.innerText = "電子署名を検証中...";
                                    
                                    // (1) Base64からの復元
                                    let signBytes;
                                    try {
                                        const binaryStr = atob(secondQR.text);
                                        if (binaryStr.length !== 42) throw new Error("Invalid signature length");
                                        signBytes = new Uint8Array(42);
                                        for (let i = 0; i < 42; i++) signBytes[i] = binaryStr.charCodeAt(i);
                                    } catch(e) {
                                        showResultScreen({ verified: false, senderName: "不明" });
                                        return;
                                    }
                                    
                                    const keyId = (signBytes[0] << 8) | signBytes[1];
                                    const sigR = signBytes.slice(2, 22);
                                    const sigS = signBytes.slice(22, 42);
                                    
                                        // (2) 第1QRのハッシュ計算と検証
                                        try {
                                            const pubKeyCacheHex = ECDSA_PUBLIC_KEYS[keyId];
                                            let verified = false;
                                            let senderName = "不明";

                                            // (2) 正規化文字列ベースのハッシュ計算（生成側と同じ方式）
                                            const signMessage = `SIGV1|${firstQR.text}|${firstQR.managementCode}`;
                                            const signMessageBytes = new TextEncoder().encode(signMessage);
                                            const hashValue = sha256Bytes(signMessageBytes);
                                            
                                            console.log(`[Verify] KeyID: ${keyId}, SignMessage: ${signMessage}, Hash: ${bytesToHex(hashValue)}`);

                                        if (pubKeyCacheHex) {
                                            senderName = ECDSA_SENDER_NAMES[keyId] || `ID:${keyId}`;
                                            verified = ecdsaVerify(signMessageBytes, sigR, sigS, pubKeyCacheHex);
                                        }
                                        
                                        showResultScreen({ verified: verified, senderName: senderName });
                                    } catch (err) {
                                        console.error("Verification failed", err);
                                        showResultScreen({ verified: false, senderName: "エラー" });
                                    }
                                    return;
                                }
                                continue;
                            }

                            // デジタル署名ではない通常のStage 3処理
                            if (topBit !== 1) continue; 

                            const diffTxt = resultData !== firstQR.text;
                            const diffMgmt = firstQR.managementCode !== undefined && resultMgmt !== undefined && firstQR.managementCode !== resultMgmt;
                            
                            if (!diffTxt && !diffMgmt) continue;

                            secondQR = { text: resultData, managementCode: resultMgmt, points: resultPts };
                            isScanning = false;
                            isProcessing = false;
                            showResultScreen();
                            return;
                        }
                    }

                } catch (e) {
                    console.error("スキャンループエラー", e);
                }
                isProcessing = false;
            }

            if (isScanning) requestAnimationFrame(scanLoop);
        }
    </script>
</body>
</html>
